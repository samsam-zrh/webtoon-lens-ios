name: Webtoon Lens TestFlight Archive

on:
  workflow_dispatch:

jobs:
  archive:
    name: Archive signed iOS app
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_BUILD_KEYCHAIN_PASSWORD }}
        run: bash ci/import-certificate.sh

      - name: Install provisioning profiles
        env:
          APP_PROFILE_BASE64: ${{ secrets.IOS_APP_PROFILE_BASE64 }}
          SAFARI_PROFILE_BASE64: ${{ secrets.IOS_SAFARI_EXTENSION_PROFILE_BASE64 }}
        run: bash ci/install-profiles.sh

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash ci/archive.sh

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebtoonLens.xcarchive
          path: build/Archive/WebtoonLens.xcarchive

      - name: Upload ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebtoonLens.ipa
          path: build/Export/*.ipa

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: bash ci/upload-testflight.sh
