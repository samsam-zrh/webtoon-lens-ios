<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111111">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <title>Webtoon Lens Preview</title>
</head>
<body>
  <main class="app-shell">
    <section class="workspace" aria-label="Lecteur Webtoon Lens">
      <div class="reader-head">
        <div>
          <p class="eyebrow">Preview mobile</p>
          <h1>Webtoon Lens</h1>
        </div>
        <button id="translateButton" type="button">Traduire</button>
      </div>

      <div class="stage" id="stage">
        <img id="previewImage" alt="Capture webtoon importee">
        <div id="emptyState" class="empty-state">
          <strong>Ajoute une capture</strong>
          <span>Teste l'overlay sur ton telephone, sans Mac ni credit cloud.</span>
        </div>
        <div id="overlay" class="overlay" aria-live="polite"></div>
      </div>

      <div class="controls">
        <label class="file-button">
          <input id="imageInput" type="file" accept="image/*">
          Choisir une image
        </label>
        <label>
          Lignes a traduire
          <textarea id="sourceText" rows="4">Astra
Je ne reculerai pas
Lame du nord</textarea>
        </label>
        <label>
          Backend optionnel
          <input id="backendUrl" type="url" placeholder="https://api.example.com">
        </label>
        <p id="statusLine" class="status-line">Backend mock pret.</p>
      </div>
    </section>

    <section class="glossary" aria-label="Glossaire">
      <div class="section-title">
        <p class="eyebrow">Glossaire</p>
        <h2>Termes verrouilles</h2>
      </div>
      <div class="term-row">
        <span>Astra</span>
        <strong>Astra</strong>
      </div>
      <div class="term-row">
        <span>Lame du nord</span>
        <strong>Lame du Nord</strong>
      </div>
      <p class="note">La preview web simule l'OCR. L'app iOS native utilise Vision + Safari Extension.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
